<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="img/favicon.ico">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">

  <link rel="stylesheet" href="css/style.css">

  <title>Visit STMIK Primakara</title>
</head>

<body>
  <div class="container py-5">
    <img src="./img/logo.svg" id="logo">
    <div class="alert alert-success mt-4 text-left">
      Berhasil masuk ke STMIK Primakara
    </div>
    
    <div class="card text-center">
      <img src="img/confirmation.png" class="card-img-top" alt="...">
      <div class="card-body">
        <p class="m-0">Tanggal :</p>
        <input type="text" class="form-control text-center custom-form" id="tglValue" placeholder="formatnya kayak gini 20-02-2021" readonly>
        
        <p class="m-0">Nama :</p>
        <input type="text" class="form-control text-center custom-form" id="namaValue" placeholder="ketik nama dlu di btn kembali" readonly>
        <button class="btn btn-success success-color-custom mt-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapseExample"
          aria-expanded="false" aria-controls="collapseExample">
          Kembali
        </button>

        <div class="collapse" id="collapseExample">
          <div class="card card-body">
            <div class="form-group">
              <label for="tgl">Tanggal :</label>
              <input type="text" class="form-control" id="tgl">
              <br>

              <label for="nama">Nama :</label>
              <input type="text" class="form-control" id="nama">
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0"
    crossorigin="anonymous"></script>

    <script>

      var tgl = document.getElementById("tgl");
      var tglValue = document.getElementById("tglValue");
      var nama = document.getElementById("nama");
      var slugValue = document.getElementById("namaValue");

      function slugify(text) {
        return text.toString()
          .replace(/^-+/, '')
          .replace(/-+$/, '');
      }

      nama.addEventListener('keyup', function () {
        namaValue.value = slugify(nama.value);
      });

      tgl.addEventListener('keyup', function () {
          tglValue.value = slugify(tgl.value);
        });

    </script>
</body>

</html>
